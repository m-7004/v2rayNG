name: Build Haider Files APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '^1.21.0'
        
    - name: Install Gomobile (The V2ray Engine Builder)
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        export PATH=$PATH:$(go env GOPATH)/bin
        gomobile init
        
    - name: Build APK (Playstore Flavor)
      working-directory: ./V2rayNG
      run: |
        chmod +x gradlew
        ./gradlew assemblePlaystoreDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Haider_Adel_Files
        path: ./V2rayNG/app/build/outputs/apk/playstore/debug/*.apk
